sonar.projectKey=pma_sandisk
sonar.projectName=Personal Memory Assistant
sonar.projectVersion=0.0.36

# Focus analysis on core backend code
sonar.sources=app
sonar.tests=tests

# Removed single-language enforcement so SonarQube correctly maps TS/TSX and RS binaries alongside PY files.
# sonar.language=py
sonar.python.version=3.12

# Frontend Source Control Bounds (Bypasses dist files and dependencies)
sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx
sonar.javascript.node.maxspace=4096

# Coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Exclude standard library, typeshed stubs, frontend node bundles, build folders and native extensions caches from analysis
sonar.exclusions=**/typeshed-fallback/**,**/Python312/Lib/**,**/__pycache__/**,frontend/node_modules/**,frontend/dist/**,app/scanner/rust_core/target/**

# Exclude frontend and tests from coverage calculation
sonar.coverage.exclusions=frontend/**,tests/**,**/*.html

sonar.host.url=http://localhost:9000
# Authentication: set SONAR_TOKEN environment variable or pass -Dsonar.login=<token>
# sonar.login=<your-token-here>